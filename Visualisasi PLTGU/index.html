    <!-- Floating Tooltip -->
    <div id="tooltip" class="map-tooltip"></div>

    <!-- Popover Card -->
    <div id="popoverCard" class="popover-card">
        <button class="popover-close" id="popoverClose" aria-label="Tutup">&times;</button>
        <img id="popoverImage" src="" alt="Building Image" class="popover-img" style="display: none;">
        <div class="popover-body">
            <h3 id="popoverTitle">Nama Bangunan</h3>
            <p id="popoverDesc">Deskripsi singkat bangunan...</p>
            <div class="popover-footer">
                <button id="btnDetail" class="btn-detail">Detail</button>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="infoModal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modalName">
        <div class="modal-content">
            <button class="close-btn" id="closeModal" aria-label="Tutup modal">&times;</button>
            <div class="modal-header">
                <span class="building-number" id="modalNumber">#00</span>
                <h2 id="modalName">Nama Bangunan</h2>
            </div>
            <div class="modal-body">
                <p id="modalDescription">Deskripsi bangunan.</p>
