                    <p id="modalDescription">Deskripsi bangunan.</p>
                </section>

                <!-- 2. Fungsi -->
                <section class="modal-section" id="modalFungsiSection">
                    <h4 class="modal-section-title">⚙️ Fungsi Bangunan</h4>
                    <ul id="modalFungsi" class="fungsi-list"></ul>
                </section>

                <!-- 3 & 4. Dimensi + Zona -->
                <div class="modal-meta-row">
                    <div class="modal-meta-item">
                        <span class="meta-label">📐 Dimensi</span>
                        <span class="meta-value" id="modalDimensi">-</span>
                    </div>
                    <div class="modal-meta-item">
                        <span class="meta-label">📍 Zona Area</span>
                        <span class="meta-value zona-badge" id="modalZonaDetail">-</span>
                    </div>
                </div>

                <!-- 5. Galeri Foto -->
                <section class="modal-gallery" id="modalGallery">
                    <h4 class="modal-section-title">📸 Foto Bangunan</h4>
                    <div id="galleryContent">
                        <!-- Gallery floor sections rendered by JS -->
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Lightbox Overlay -->
    <div id="lightboxOverlay" class="lightbox-overlay">
        <button class="lightbox-close" id="lightboxClose" aria-label="Tutup">&times;</button>
        <img id="lightboxImage" src="" alt="Full size photo">
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

</body>

</html>
